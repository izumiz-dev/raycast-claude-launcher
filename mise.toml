# ─────────────────────────────────────────────────────────────
# Strictly pin the Raycast extension's build environment (reproducible build / pnpm).
# `cd` into this directory and the tools/env below take effect automatically.
# ─────────────────────────────────────────────────────────────

# Require the minimum mise version that can handle this file
min_version = "2025.1.0"

[settings]
# Generate mise.lock to lock exact tool versions/hashes (strict)
lockfile = true
# Ignore loose version files like .nvmrc; this file is the single source of truth
idiomatic_version_file_enable_tools = []
# Suppress auto-installing unknown/unpinned tools
not_found_auto_install = false

[tools]
# The Raycast `ray` CLI wants a recent Node
node = "latest"
# Package manager is pnpm (kept in sync with package.json's packageManager)
pnpm = "latest"

[env]
NODE_ENV = "development"
# Put local deps (ray, tsc, etc.) on PATH so mise tasks can call them by bare name
_.path = ["{{config_root}}/node_modules/.bin"]

# ───────────────────────── tasks (build commands consolidated in mise) ─────────────────────────

[tasks.install]
description = "Resolve dependencies (pnpm install). No quoting, so it works under pwsh too"
run = "pnpm install"

[tasks.clean]
description = "Remove node_modules / lockfiles (OS-independent; scripts/clean.mjs)"
run = "node scripts/clean.mjs"

[tasks.build]
description = "Build the Raycast extension (includes type checking)"
run = "pnpm exec ray build -e dist"

[tasks.dev]
description = "Load into Raycast in development mode"
run = "pnpm exec ray develop"

[tasks.lint]
description = "Lint"
run = "pnpm exec ray lint"

[tasks.reset]
description = "Full reset → reinstall → build (run in sequence)"
run = ["node scripts/clean.mjs", "pnpm install", "pnpm exec ray build -e dist"]

[tasks.sync]
description = "Sync source from WSL to Windows (excludes node_modules; --inplace)"
run = "bash scripts/sync-to-windows.sh"

[tasks.sync-watch]
description = "Watch for changes and auto-sync (requires inotify-tools)"
run = "bash scripts/sync-to-windows.sh --watch"

[tasks.doctor]
description = "Check the environment (node/pnpm/ray versions)"
run = """
node -v
pnpm -v
pnpm exec ray --version || echo 'ray becomes available after pnpm install'
"""
